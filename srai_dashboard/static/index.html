<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SRAI — Panel de Monitoreo</title>
<style>
/* ═══════════════════════════════════════════
   VARIABLES & RESET
═══════════════════════════════════════════ */
:root {
  --bg:          #0f172a;
  --surface:     #1e293b;
  --surface2:    #263248;
  --border:      #334155;
  --text:        #e2e8f0;
  --muted:       #94a3b8;
  --green:       #22c55e;
  --green-bg:    rgba(34,197,94,0.13);
  --amber:       #f59e0b;
  --amber-bg:    rgba(245,158,11,0.13);
  --orange:      #f97316;
  --orange-bg:   rgba(249,115,22,0.13);
  --red:         #ef4444;
  --red-bg:      rgba(239,68,68,0.13);
  --blue:        #38bdf8;
  --blue-bg:     rgba(56,189,248,0.12);
  --violet:      #a78bfa;
  --radius:      12px;
  --gap:         10px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  overflow: hidden;
}

body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
  font-size: 13px;
}

/* ═══════════════════════════════════════════
   HEADER
═══════════════════════════════════════════ */
header {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 7px 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  gap: 12px;
}

.brand {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 0.4px;
  white-space: nowrap;
}

.brand-dot { color: var(--green); font-size: 10px; }

.header-right {
  display: flex;
  align-items: center;
  gap: 14px;
  font-size: 12px;
  color: var(--muted);
}

.pulse-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--green);
  display: inline-block;
  animation: pulse 2.2s ease-in-out infinite;
}

#clock {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  font-variant-numeric: tabular-nums;
  letter-spacing: 0.5px;
}

/* ═══════════════════════════════════════════
   MAIN GRID — 2×2
═══════════════════════════════════════════ */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: 1fr 1fr;
  gap: var(--gap);
  padding: var(--gap);
  flex: 1;
  min-height: 0;
  overflow: hidden;
}

/* ═══════════════════════════════════════════
   CARD
═══════════════════════════════════════════ */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-height: 0;
}

.card-hdr {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  gap: 8px;
}

.card-title {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.9px;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 5px;
}

.card-body {
  flex: 1;
  overflow: auto;
  padding: 10px 12px;
  min-height: 0;
}

/* ═══════════════════════════════════════════
   SHARED ATOMS
═══════════════════════════════════════════ */
.tag {
  font-size: 10px;
  background: var(--surface2);
  border-radius: 999px;
  padding: 2px 8px;
  color: var(--muted);
  white-space: nowrap;
  font-variant-numeric: tabular-nums;
}

.badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 4px 10px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 700;
  white-space: nowrap;
}

.badge-sanas          { background: var(--green-bg);  color: var(--green); }
.badge-tizon_temprano { background: var(--amber-bg);  color: var(--amber); }
.badge-moho_foliar    { background: var(--orange-bg); color: var(--orange); }
.badge-TYLCV          { background: var(--red-bg);    color: var(--red); }
.badge-unknown        { background: rgba(100,116,139,.15); color: var(--muted); }

.status {
  font-size: 9px;
  font-weight: 700;
  padding: 2px 6px;
  border-radius: 999px;
  text-transform: uppercase;
  letter-spacing: 0.4px;
  white-space: nowrap;
}

.s-ok   { background: var(--green-bg);  color: var(--green); }
.s-warn { background: var(--amber-bg);  color: var(--amber); }
.s-crit { background: var(--red-bg);    color: var(--red); }
.s-info { background: var(--blue-bg);   color: var(--blue); }

.divider { height: 1px; background: var(--border); margin: 6px 0; }

.no-data {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  gap: 8px;
  color: var(--muted);
}

.spinner {
  width: 22px; height: 22px;
  border: 3px solid var(--border);
  border-top-color: var(--blue);
  border-radius: 50%;
  animation: spin 0.75s linear infinite;
}

/* ═══════════════════════════════════════════
   SECTION 1 — Latest Inference
═══════════════════════════════════════════ */
.s1-wrap {
  display: flex;
  gap: 12px;
  height: 100%;
  min-height: 0;
}

.s1-img-box {
  flex: 0 0 42%;
  background: #080e1c;
  border-radius: 8px;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

.s1-img-box img {
  width: 100%; height: 100%;
  object-fit: contain;
}

.s1-info {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 9px;
  min-width: 0;
  overflow-y: auto;
  padding-right: 2px;
}

.conf-row {
  display: flex;
  align-items: center;
  gap: 8px;
}

.conf-bar {
  flex: 1;
  height: 5px;
  background: var(--surface2);
  border-radius: 3px;
  overflow: hidden;
}

.conf-fill {
  height: 100%;
  border-radius: 3px;
  transition: width .5s ease;
}

.meta {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.meta-lbl {
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--muted);
}

.meta-val {
  font-size: 13px;
  font-weight: 600;
}

.prob-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4px;
}

.prob-item {
  background: var(--surface2);
  border-radius: 6px;
  padding: 4px 7px;
  font-size: 10px;
}

.prob-name { color: var(--muted); }
.prob-val  { font-weight: 700; }

/* ═══════════════════════════════════════════
   SECTION 2 — Image Carousel
═══════════════════════════════════════════ */
.car-wrap {
  display: flex;
  flex-direction: column;
  height: 100%;
  gap: 6px;
  min-height: 0;
}

.car-stage {
  flex: 1;
  position: relative;
  background: #080e1c;
  border-radius: 8px;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 0;
}

.car-stage img {
  width: 100%; height: 100%;
  object-fit: contain;
}

.car-btn {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(0,0,0,.55);
  border: none;
  color: #fff;
  font-size: 17px;
  padding: 5px 9px;
  border-radius: 6px;
  cursor: pointer;
  z-index: 2;
  line-height: 1;
  transition: background .15s;
}

.car-btn:hover { background: rgba(0,0,0,.85); }
.car-prev { left: 7px; }
.car-next { right: 7px; }

.car-info {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 6px;
}

.car-dots {
  display: flex;
  gap: 4px;
  justify-content: center;
  flex-shrink: 0;
}

.dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--border);
  cursor: pointer;
  transition: background .2s;
}

.dot.active { background: var(--blue); }

/* ═══════════════════════════════════════════
   SECTION 3 — Sensor Carousel
═══════════════════════════════════════════ */
.dev-nav {
  display: flex;
  align-items: center;
  gap: 5px;
}

.btn-sm {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 5px;
  padding: 1px 7px;
  cursor: pointer;
  font-size: 13px;
  line-height: 1.6;
  transition: background .15s;
}

.btn-sm:hover { background: var(--border); }

.dev-slide {
  display: flex;
  flex-direction: column;
  gap: 6px;
  height: 100%;
  overflow: auto;
}

.sg {
  background: var(--surface2);
  border-radius: 8px;
  padding: 7px 10px;
}

.sg-title {
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--muted);
  margin-bottom: 5px;
}

.sr {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 2px 0;
}

.sr-name {
  flex: 1;
  color: var(--muted);
  font-size: 11px;
}

.sr-val {
  font-size: 13px;
  font-weight: 600;
  font-variant-numeric: tabular-nums;
}

.valve-open   { color: var(--green); font-weight: 700; font-size: 11px; }
.valve-closed { color: var(--muted); font-size: 11px; }

.zona-block {
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px;
  margin-bottom: 6px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.zona-block-title {
  font-size: 11px;
  font-weight: 700;
  color: var(--blue);
}

/* ═══════════════════════════════════════════
   SECTION 4 — Averages
═══════════════════════════════════════════ */
.avg-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}

.avg-card {
  background: var(--surface2);
  border-radius: 8px;
  padding: 7px 10px;
}

.avg-lbl {
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 0.7px;
  color: var(--muted);
}

.avg-val {
  font-size: 20px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  line-height: 1.2;
  margin: 2px 0;
}

.avg-unit {
  font-size: 10px;
  color: var(--muted);
}

.gas-row {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 2px 0;
}

.gas-name { flex: 1; color: var(--muted); font-size: 11px; }
.gas-val  { font-size: 12px; font-weight: 600; font-variant-numeric: tabular-nums; }

/* ═══════════════════════════════════════════
   ANIMATIONS
═══════════════════════════════════════════ */
@keyframes spin  { to { transform: rotate(360deg); } }
@keyframes pulse {
  0%,100% { opacity:1; transform:scale(1);   }
  50%      { opacity:.5; transform:scale(.8); }
}

/* scrollbar */
::-webkit-scrollbar        { width: 3px; height: 3px; }
::-webkit-scrollbar-track  { background: transparent; }
::-webkit-scrollbar-thumb  { background: var(--border); border-radius: 2px; }

/* ═══════════════════════════════════════════
   SECCIÓN 4 — Vista Histórica
═══════════════════════════════════════════ */
.s4-views {
  display: flex;
  flex-direction: column;
  height: 100%;
  min-height: 0;
}

.s4-avg-view,
.s4-hist-view {
  display: flex;
  flex-direction: column;
  height: 100%;
  min-height: 0;
}

.period-tabs {
  display: flex;
  gap: 4px;
  flex-shrink: 0;
  margin-bottom: 8px;
}

.period-tab {
  flex: 1;
  padding: 5px 4px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--muted);
  border-radius: 5px;
  cursor: pointer;
  font-size: 11px;
  font-weight: 700;
  text-align: center;
  transition: all .15s;
}

.period-tab.active {
  background: var(--blue-bg);
  color: var(--blue);
  border-color: var(--blue);
}

.hist-scroll {
  flex: 1;
  overflow: auto;
  min-height: 0;
}

.hist-section-title {
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--muted);
  margin: 8px 0 4px;
}

.hist-section-title:first-child { margin-top: 0; }

.hist-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 10px;
}

.hist-table th {
  text-align: right;
  color: var(--muted);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.4px;
  padding: 3px 5px;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}

.hist-table th:first-child { text-align: left; }

.hist-table td {
  text-align: right;
  padding: 2px 5px;
  font-variant-numeric: tabular-nums;
  border-bottom: 1px solid rgba(51,65,85,0.35);
}

.hist-table td:first-child { text-align: left; color: var(--muted); }
.hist-table tr:last-child td { border-bottom: none; }

.inf-period-block { margin-bottom: 8px; }

.inf-period-lbl {
  font-size: 9px;
  color: var(--muted);
  margin-bottom: 3px;
}

.inf-cls-row {
  display: flex;
  align-items: center;
  gap: 5px;
  margin-bottom: 2px;
}

.inf-cls-name {
  font-size: 9px;
  color: var(--muted);
  width: 90px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  flex-shrink: 0;
}

.inf-bar-bg {
  flex: 1;
  height: 4px;
  background: var(--surface2);
  border-radius: 2px;
  overflow: hidden;
}

.inf-bar-fill { height: 100%; border-radius: 2px; }

.inf-cls-count {
  font-size: 9px;
  font-variant-numeric: tabular-nums;
  width: 22px;
  text-align: right;
  flex-shrink: 0;
}

/* ═══════════════════════════════════════════
   ICONOS SVG (estilo Material, como la app)
═══════════════════════════════════════════ */
.ic { vertical-align: middle; flex-shrink: 0; }
.card-title .ic { color: var(--muted); }

/* ═══════════════════════════════════════════
   RESPONSIVE — celular / tableta / escritorio
═══════════════════════════════════════════ */
@media (max-width: 820px) {
  html, body { height: auto; overflow: auto; }
  .grid {
    grid-template-columns: 1fr;
    grid-template-rows: none;
    flex: none;
    overflow: visible;
  }
  .card { min-height: 300px; }
  header { flex-wrap: wrap; }
}
@media (max-width: 480px) {
  body { font-size: 12px; }
  .brand { font-size: 13px; }
  .avg-grid { grid-template-columns: 1fr; }
  .s1-wrap { flex-direction: column; }
  .s1-img-box { flex: 0 0 150px; }
}
</style>
</head>
<body>

<!-- ── HEADER ─────────────────────────────────────────────────────────── -->
<header>
  <div class="brand">
    <span class="brand-dot">●</span>
    SRAI — Panel de Monitoreo
  </div>
  <div class="header-right">
    <span class="pulse-dot"></span>
    <span id="last-update">Cargando…</span>
    <span id="clock">--:--:--</span>
  </div>
</header>

<!-- ── GRID 2×2 ───────────────────────────────────────────────────────── -->
<main class="grid">

  <!-- ┌ SECCIÓN 1: Última Inferencia ─────────────────────────────────── -->
  <div class="card">
    <div class="card-hdr">
      <div class="card-title"><svg class="ic" viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M19.8 18.4L14 10.67V6.5l1.35-1.69c.26-.33.03-.81-.39-.81H9.04c-.42 0-.65.48-.39.81L10 6.5v4.17L4.2 18.4c-.49.66-.02 1.6.8 1.6h14c.82 0 1.29-.94.8-1.6zM7.5 16l2.5-3.33V6h4v6.67L16.5 16h-9z"/></svg> Última Inferencia</div>
      <span class="tag" id="s1-device">—</span>
    </div>
    <div class="card-body" id="s1-body">
      <div class="no-data"><div class="spinner"></div></div>
    </div>
  </div>

  <!-- ┐ SECCIÓN 2: Carrusel Imágenes de Hoy ─────────────────────────── -->
  <div class="card">
    <div class="card-hdr">
      <div class="card-title"><svg class="ic" viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M22 16V4c0-1.1-.9-2-2-2H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2zm-11-4l2.03 2.71L16 11l4 5H8l3-4zM2 6v14c0 1.1.9 2 2 2h14v-2H4V6H2z"/></svg> Imágenes de Hoy</div>
      <span class="tag" id="s2-counter">0 imágenes</span>
    </div>
    <div class="card-body" id="s2-body">
      <div class="no-data"><div class="spinner"></div></div>
    </div>
  </div>

  <!-- └ SECCIÓN 3: Carrusel Sensores por Dispositivo ────────────────── -->
  <div class="card">
    <div class="card-hdr">
      <div class="card-title"><svg class="ic" viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M7.76 16.24C6.67 15.16 6 13.66 6 12s.67-3.16 1.76-4.24l1.42 1.42C8.45 9.9 8 10.9 8 12c0 1.1.45 2.1 1.17 2.83l-1.41 1.41zm8.48 0C17.33 15.16 18 13.66 18 12s-.67-3.16-1.76-4.24l-1.42 1.42C15.55 9.9 16 10.9 16 12c0 1.1-.45 2.1-1.17 2.83l1.41 1.41zM12 10c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zM4.93 19.07C3.12 17.26 2 14.76 2 12s1.12-5.26 2.93-7.07l1.42 1.42C4.9 7.79 4 9.79 4 12c0 2.21.9 4.21 2.35 5.66l-1.42 1.41zm14.14 0l-1.42-1.42C18.1 16.21 19 14.21 19 12c0-2.21-.9-4.21-2.35-5.66l1.42-1.42C19.88 6.74 21 9.24 21 12s-1.12 5.26-2.93 7.07z"/></svg> Sensores por Dispositivo</div>
      <div class="dev-nav">
        <span class="tag" id="s3-counter">0/0</span>
        <button class="btn-sm" id="s3-prev">‹</button>
        <button class="btn-sm" id="s3-next">›</button>
      </div>
    </div>
    <div class="card-body" id="s3-body">
      <div class="no-data"><div class="spinner"></div></div>
    </div>
  </div>

  <!-- ┘ SECCIÓN 4: Promedios Globales / Histórico ──────────────────── -->
  <div class="card">
    <div class="card-hdr">
      <div class="card-title" id="s4-title"><svg class="ic" viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-8 14H9v-4h2v4zm4 0h-2V7h2v10zm4 0h-2v-7h2v7z"/></svg> Promedios Globales</div>
      <div style="display:flex;align-items:center;gap:5px">
        <span class="tag" id="s4-tag">última lectura</span>
        <button class="btn-sm" id="s4-toggle" title="Ver histórico">≡ Hist.</button>
      </div>
    </div>
    <div class="card-body" id="s4-body">
      <div class="no-data"><div class="spinner"></div></div>
    </div>
  </div>

</main>

<script>
/* ═══════════════════════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════════════════════ */

function fmtDatetime(iso) {
  if (!iso) return '—';
  return new Intl.DateTimeFormat('es-MX', {
    year: 'numeric', month: '2-digit', day: '2-digit',
    hour: '2-digit', minute: '2-digit', second: '2-digit',
    hour12: false
  }).format(new Date(iso));
}

function fmtTime(iso) {
  if (!iso) return '—';
  return new Intl.DateTimeFormat('es-MX', {
    hour: '2-digit', minute: '2-digit', second: '2-digit',
    hour12: false
  }).format(new Date(iso));
}

function n(val, dec = 1) {
  if (val === null || val === undefined) return '—';
  return Number(val).toFixed(dec);
}

function claseInfo(clase) {
  const map = {
    sanas:          { label: 'Planta Sana',     css: 'badge-sanas',          icon: '🌱', color: '#22c55e' },
    tizon_temprano: { label: 'Tizón Temprano',  css: 'badge-tizon_temprano', icon: '⚠️', color: '#f59e0b' },
    moho_foliar:    { label: 'Moho Foliar',     css: 'badge-moho_foliar',    icon: '🍄', color: '#f97316' },
    TYLCV:          { label: 'TYLCV',           css: 'badge-TYLCV',          icon: '🚨', color: '#ef4444' },
  };
  return map[clase] || { label: clase || 'Desconocido', css: 'badge-unknown', icon: '❓', color: '#6b7280' };
}

function statusCss(estado) {
  if (!estado) return '';
  const s = estado.toUpperCase();
  if (['OPTIMA','BUENA','ADECUADA','NORMAL'].some(x => s.includes(x))) return 's-ok';
  if (['BAJA','ALTA','MODERADA','ELEVADA'].some(x => s.includes(x)))   return 's-warn';
  if (['CRITICA','MUY_ALTA','MUY_BAJA','PELIGROS'].some(x => s.includes(x))) return 's-crit';
  return 's-info';
}

// Devuelve el badge de estado; si el sensor no envió dato (null/NaN o estado
// "sin_dato") muestra "SIN DATOS" en rojo.
function sensorStatus(val, estado) {
  const sinDato = val === null || val === undefined ||
                  (typeof val === 'number' && isNaN(val)) || estado === 'sin_dato';
  if (sinDato) return '<span class="status s-crit">SIN DATOS</span>';
  return `<span class="status ${statusCss(estado)}">${estado || '—'}</span>`;
}

   RELOJ
═══════════════════════════════════════════════════════════════ */
function startClock() {
  const el = document.getElementById('clock');
  const fmt = new Intl.DateTimeFormat('es-MX', {
    hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
  });
  const tick = () => el.textContent = fmt.format(new Date());
  tick();
  setInterval(tick, 1000);
}

/* ═══════════════════════════════════════════════════════════════
   FETCH
═══════════════════════════════════════════════════════════════ */
async function fetchJSON(url) {
  try {
    const r = await fetch(url);
    if (!r.ok) return null;
    return await r.json();
  } catch { return null; }
}

async function fetchAll() {
  const [latest, today, sensors, averages] = await Promise.all([
    fetchJSON('/api/latest-inference'),
    fetchJSON('/api/today-captures'),
    fetchJSON('/api/sensors/all-latest'),
    fetchJSON('/api/sensors/averages'),
  ]);
  return { latest, today, sensors, averages };
}

/* ═══════════════════════════════════════════════════════════════
   SECCIÓN 1 — Última Inferencia
═══════════════════════════════════════════════════════════════ */
function renderS1(payload) {
  const body   = document.getElementById('s1-body');
  const devTag = document.getElementById('s1-device');

  const d = payload?.data;
  if (!d) {
    devTag.textContent = '—';
    body.innerHTML = `<div class="no-data">Sin datos de inferencia</div>`;
    return;
  }

  const ci   = claseInfo(d.clase);
  const conf = ((d.confianza ?? 0) * 100).toFixed(1);

  // Normalizar probabilidades: garantizar dict con valores numéricos finitos
  let rawProbs = d.probabilidades;
  if (typeof rawProbs === 'string') {
    try { rawProbs = JSON.parse(rawProbs); } catch { rawProbs = {}; }
  }
  if (!rawProbs || typeof rawProbs !== 'object' || Array.isArray(rawProbs)) rawProbs = {};
  const probs = Object.fromEntries(
    Object.entries(rawProbs).filter(([, v]) => typeof v === 'number' && isFinite(v))
  );

  devTag.textContent = d.device_id || '—';

  body.innerHTML = `
    <div class="s1-wrap">
      <div class="s1-img-box">
        ${d.image_url
          ? `<img src="${d.image_url}" alt="Captura" loading="lazy" onerror="this.style.display='none'">`
          : `<div class="no-data" style="height:100%;font-size:11px">Sin imagen</div>`}
      </div>
      <div class="s1-info">
        <div>
          <span class="badge ${ci.css}">${ci.icon} ${ci.label}</span>
        </div>

        <div>
          <div class="meta-lbl" style="font-size:9px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:3px">Confianza</div>
          <div class="conf-row">
            <div class="conf-bar">
              <div class="conf-fill" style="width:${conf}%;background:${ci.color}"></div>
            </div>
            <span style="font-size:13px;font-weight:700;font-variant-numeric:tabular-nums">${conf}%</span>
          </div>
        </div>

        <div class="meta">
          <span class="meta-lbl">Dispositivo</span>
          <span class="meta-val">${d.device_id || '—'}</span>
        </div>
        <div class="meta">
          <span class="meta-lbl">Imagen recibida</span>
          <span class="meta-val" style="font-size:11px">${fmtDatetime(d.received_at)}</span>
        </div>
        <div class="meta">
          <span class="meta-lbl">Inferencia procesada</span>
          <span class="meta-val" style="font-size:11px">${fmtDatetime(d.processed_at)}</span>
        </div>

        ${Object.keys(probs).length > 0 ? `
        <div>
          <div class="meta-lbl" style="font-size:9px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:4px">Probabilidades</div>
          <div class="prob-grid">
            ${Object.entries(probs).map(([k, v]) => {
              const pci = claseInfo(k);
              return `<div class="prob-item">
                <div class="prob-name">${k}</div>
                <div class="prob-val" style="color:${pci.color}">${(v * 100).toFixed(1)}%</div>
              </div>`;
            }).join('')}
          </div>
        </div>` : ''}
      </div>
    </div>
  `;
}

/* ═══════════════════════════════════════════════════════════════
   SECCIÓN 2 — Carrusel Imágenes de Hoy
═══════════════════════════════════════════════════════════════ */
let s2Items   = [];
let s2Idx     = 0;
let s2Timer   = null;
const s2Failed = new Set(); // capture_ids cuya imagen falló en MinIO

function renderS2(payload) {
  const body    = document.getElementById('s2-body');
  const counter = document.getElementById('s2-counter');

  if (s2Timer) clearInterval(s2Timer);

  const newItems = (payload?.data || []).filter(d => d.image_url);
  counter.textContent = `${newItems.length} imagen${newItems.length !== 1 ? 'es' : ''}`;

  if (newItems.length === 0) {
    s2Items = [];
    body.innerHTML = `<div class="no-data">Sin imágenes registradas hoy</div>`;
    return;
  }

  // Preservar posición actual si el item sigue existiendo tras el refresco
  const currentId = s2Items[s2Idx]?.capture_id;
  s2Items = newItems;
  const preserved = s2Items.findIndex(d => d.capture_id === currentId);
  s2Idx = preserved >= 0 ? preserved : 0;

  const maxDots = Math.min(s2Items.length, 10);
  const dotsHtml = Array.from({ length: maxDots }, (_, i) =>
    `<div class="dot" data-i="${i}"></div>`
  ).join('');

  // Solo inyectar el DOM si no existe ya (evita parpadeo en refrescos)
  if (!document.getElementById('s2-img')) {
    body.innerHTML = `
      <div class="car-wrap">
        <div class="car-stage" id="s2-stage">
          <button class="car-btn car-prev" id="s2-prev">‹</button>
          <img id="s2-img" src="" alt="Captura">
          <button class="car-btn car-next" id="s2-next">›</button>
        </div>
        <div class="car-info" id="s2-info"></div>
        <div class="car-dots" id="s2-dots">${dotsHtml}</div>
      </div>
    `;
    document.getElementById('s2-prev').addEventListener('click', () =>
      s2GoTo((s2Idx - 1 + s2Items.length) % s2Items.length));
    document.getElementById('s2-next').addEventListener('click', () =>
      s2GoTo((s2Idx + 1) % s2Items.length));
    document.getElementById('s2-img').addEventListener('error', () => {
      // Marcar como fallida y filtrar sin cascade visual (debounce 200 ms)
      const failedId = s2Items[s2Idx]?.capture_id;
      if (failedId) s2Failed.add(failedId);
      s2Items = s2Items.filter(d => !s2Failed.has(d.capture_id));
      // Mantener el contador en sincronía con las imágenes realmente disponibles
      counter.textContent = `${s2Items.length} imagen${s2Items.length !== 1 ? 'es' : ''}`;
      if (s2Items.length === 0) {
        if (s2Timer) { clearInterval(s2Timer); s2Timer = null; }
        body.innerHTML = `<div class="no-data">Sin imágenes disponibles</div>`;
        return;
      }
      s2Idx = Math.min(s2Idx, s2Items.length - 1);
      // Rehacer los dots según la cantidad restante
      const dotsEl = document.getElementById('s2-dots');
      if (dotsEl) {
        const maxD = Math.min(s2Items.length, 10);
        dotsEl.innerHTML = Array.from({ length: maxD }, (_, i) => `<div class="dot" data-i="${i}"></div>`).join('');
        dotsEl.querySelectorAll('.dot').forEach(el =>
          el.addEventListener('click', () => s2GoTo(parseInt(el.dataset.i))));
      }
      setTimeout(() => s2GoTo(s2Idx), 200);
    });
  } else {
    // Actualizar los dots si cambió la cantidad
    const dotsEl = document.getElementById('s2-dots');
    if (dotsEl) dotsEl.innerHTML = dotsHtml;
  }

  document.querySelectorAll('#s2-dots .dot').forEach(el =>
    el.addEventListener('click', () => s2GoTo(parseInt(el.dataset.i)))
  );

  s2GoTo(s2Idx);
  s2Timer = setInterval(() => s2GoTo((s2Idx + 1) % s2Items.length), 6000);
}

function s2GoTo(idx) {
  if (s2Items.length === 0) return;
  s2Idx = idx;
  const d  = s2Items[idx];
  const ci = claseInfo(d.clase);

  const imgEl = document.getElementById('s2-img');
  if (imgEl) imgEl.src = d.image_url + '?t=' + Date.now(); // evita caché del browser

  const infoEl = document.getElementById('s2-info');
  if (infoEl) infoEl.innerHTML = `
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;width:100%">
      <div class="meta" style="min-width:0">
        <span class="meta-lbl" style="font-size:9px">Dispositivo</span>
        <span style="font-size:11px;font-weight:600;white-space:nowrap">${d.device_id || '—'}</span>
      </div>
      <div class="meta" style="min-width:0">
        <span class="meta-lbl" style="font-size:9px">Recibida</span>
        <span style="font-size:11px;font-weight:600;white-space:nowrap">${fmtDatetime(d.received_at)}</span>
      </div>
      <span class="badge ${ci.css}" style="font-size:10px;padding:3px 8px">
        ${ci.icon} ${ci.label} · ${((d.confianza ?? 0)*100).toFixed(1)}%
      </span>
      <span style="margin-left:auto;font-size:10px;color:var(--muted);white-space:nowrap">${idx+1} / ${s2Items.length}</span>
    </div>
  `;

  document.querySelectorAll('#s2-dots .dot').forEach((el, i) =>
    el.classList.toggle('active', i === idx)
  );
}

/* ═══════════════════════════════════════════════════════════════
   SECCIÓN 3 — Carrusel Sensores por Dispositivo
═══════════════════════════════════════════════════════════════ */
let s3Devices = [];
let s3Idx     = 0;
let s3DevData = {};

function renderS3(payload) {
  const newDevices = payload?.devices || [];
  s3DevData = payload?.data || {};

  if (newDevices.length === 0) {
    s3Devices = [];
    document.getElementById('s3-counter').textContent = '0/0';
    document.getElementById('s3-body').innerHTML =
      `<div class="no-data">Sin datos de sensores</div>`;
    return;
  }

  // Preservar dispositivo actual si sigue existiendo
  const current = s3Devices[s3Idx];
  s3Devices = newDevices;
  const preserved = s3Devices.indexOf(current);
  s3Idx = preserved >= 0 ? preserved : 0;

  s3ShowDevice();
}

function s3ShowDevice() {
  if (s3Devices.length === 0) return;

  const deviceId  = s3Devices[s3Idx];
  const zonas     = s3DevData[deviceId] || {};
  const zonaKeys  = Object.keys(zonas).sort();
  document.getElementById('s3-counter').textContent = `${s3Idx + 1}/${s3Devices.length}`;

  if (zonaKeys.length === 0) {
    document.getElementById('s3-body').innerHTML = `<div class="no-data">Sin zonas para ${deviceId}</div>`;
    return;
  }

  const latestUpdate = zonaKeys
    .map(z => zonas[z].recorded_at)
    .filter(Boolean)
    .sort()
    .pop();

  // ESP32 sin reportar por más de DISCONNECT_MS → datos de zona reseteados a "—"
  const DISCONNECT_MS = 150000;
  const stale = !latestUpdate || (Date.now() - new Date(latestUpdate).getTime() > DISCONNECT_MS);
  const NULL_FIELDS = {
    temperatura: null, hum_ambiente: null, hum_suelo: null, co2_ppm: null,
    co_ppm: null, nh3_ppm: null, alcohol_ppm: null, humo_ppm: null,
    tolueno_ppm: null, acetona_ppm: null,
    temp_estado: 'sin_dato', hum_amb_estado: 'sin_dato',
    suelo_estado: 'sin_dato', co2_estado: 'sin_dato',
  };

  const zonasHtml = zonaKeys.map(zonaKey => {
    const d = stale ? { ...zonas[zonaKey], ...NULL_FIELDS } : zonas[zonaKey];
    const valv = d.valvula
      ? '<span class="valve-open">■ ABIERTA</span>'
      : '<span class="valve-closed">□ CERRADA</span>';

    return `
      <div class="zona-block">
        <div class="zona-block-title">${ic('location', 14)} ${zonaKey.toUpperCase()}</div>

        <div class="sg">
          <div class="sr">
            <span class="sr-name">Temperatura</span>
            <span class="sr-val">${n(d.temperatura, 1)} °C</span>
            ${sensorStatus(d.temperatura, d.temp_estado)}
          </div>
          <div class="sr">
            <span class="sr-name">Humedad Ambiente</span>
            <span class="sr-val">${n(d.hum_ambiente, 1)} %</span>
            ${sensorStatus(d.hum_ambiente, d.hum_amb_estado)}
          </div>
          <div class="sr">
            <span class="sr-name">Suelo</span>
            <span class="sr-val">${d.hum_suelo ?? '—'} %</span>
            ${sensorStatus(d.hum_suelo, d.suelo_estado)}
          </div>
          <div class="sr" style="padding-left:12px">
            <span class="sr-name" style="font-size:10px;color:var(--muted)">Válvula</span>
            ${valv}
          </div>
        </div>

        <div class="sg">
          <div class="sg-title">${ic('air', 13)} Calidad del Aire — MQ-135</div>
          <div class="sr">
            <span class="sr-name">CO₂</span>
            <span class="sr-val">${n(d.co2_ppm, 1)} ppm</span>
            ${sensorStatus(d.co2_ppm, d.co2_estado)}
          </div>
          <div class="sr"><span class="sr-name">CO (Monóxido)</span><span class="sr-val">${n(d.co_ppm, 4)} ppm</span></div>
          <div class="sr"><span class="sr-name">NH₃ (Amoniaco)</span><span class="sr-val">${n(d.nh3_ppm, 4)} ppm</span></div>
          <div class="sr"><span class="sr-name">Alcohol</span><span class="sr-val">${n(d.alcohol_ppm, 4)} ppm</span></div>
          <div class="sr"><span class="sr-name">Humo</span><span class="sr-val">${n(d.humo_ppm, 4)} ppm</span></div>
          <div class="sr"><span class="sr-name">Tolueno</span><span class="sr-val">${n(d.tolueno_ppm, 4)} ppm</span></div>
          <div class="sr"><span class="sr-name">Acetona</span><span class="sr-val">${n(d.acetona_ppm, 4)} ppm</span></div>
        </div>
      </div>
    `;
  }).join('');

  document.getElementById('s3-body').innerHTML = `
    <div class="dev-slide">
      <div style="display:flex;align-items:center;justify-content:space-between;padding-bottom:2px">
        <span style="font-size:13px;font-weight:700;color:var(--blue)">${deviceId}</span>
        <span style="font-size:10px;color:var(--muted)">${zonaKeys.length} zona${zonaKeys.length !== 1 ? 's' : ''} · ${fmtDatetime(latestUpdate)}${stale ? ' <span class="status s-crit" style="margin-left:6px">SIN CONEXIÓN</span>' : ''}</span>
      </div>
      ${zonasHtml}
    </div>
  `;
}

// Botones de S3 viven en el header → listeners se registran una sola vez
document.getElementById('s3-prev').addEventListener('click', () => {
  if (s3Devices.length === 0) return;
  s3Idx = (s3Idx - 1 + s3Devices.length) % s3Devices.length;
  s3ShowDevice();
});
document.getElementById('s3-next').addEventListener('click', () => {
  if (s3Devices.length === 0) return;
  s3Idx = (s3Idx + 1) % s3Devices.length;
  s3ShowDevice();
});

        <div class="avg-lbl">${ic('water', 13)} Humedad de Suelo</div>
        <div class="avg-val" style="color:var(--green)">${n(d.avg_hum_suelo, 1)}</div>
        <div class="avg-unit">% — ${d.zone_count} zonas</div>
      </div>
    </div>
    <div class="divider"></div>
    <div class="sg">
      <div class="sg-title">${ic('science', 13)} Gases Traza — ppm (${d.device_count} disp. · ${d.zone_count} zonas)</div>
      <div class="gas-row"><span class="gas-name">CO (Monóxido)</span><span class="gas-val">${n(d.avg_co_ppm, 4)}</span></div>
      <div class="gas-row"><span class="gas-name">NH₃ (Amoniaco)</span><span class="gas-val">${n(d.avg_nh3_ppm, 4)}</span></div>
      <div class="gas-row"><span class="gas-name">Alcohol</span><span class="gas-val">${n(d.avg_alcohol_ppm, 4)}</span></div>
      <div class="gas-row"><span class="gas-name">Humo</span><span class="gas-val">${n(d.avg_humo_ppm, 4)}</span></div>
      <div class="gas-row"><span class="gas-name">Tolueno</span><span class="gas-val">${n(d.avg_tolueno_ppm, 4)}</span></div>
      <div class="gas-row"><span class="gas-name">Acetona</span><span class="gas-val">${n(d.avg_acetona_ppm, 4)}</span></div>
    </div>
    <div style="text-align:right;font-size:9px;color:var(--muted);margin-top:6px">
      Última lectura: ${fmtDatetime(d.newest_reading)} · ${d.reading_count} registros
    </div>
  `;
}

/* ─── Renderiza la vista histórica ───────────────────────────── */
function renderS4Hist(sensors, inference) {
  const el = document.getElementById('s4-hist-inner');
  if (!el) return;

  const sRows = sensors?.data || [];
  const iRows = inference?.data || [];

  const fmtP = (iso) => {
    if (!iso) return '—';
    const d = new Date(iso);
    return s4Period === 'day'
      ? `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`
      : `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}`;
  };

  // Tabla de sensores
  const sHtml = sRows.length === 0
    ? `<div class="no-data" style="height:50px;font-size:11px">Sin datos</div>`
    : `<div style="overflow-x:auto">
        <table class="hist-table">
          <thead><tr>
            <th>Período</th><th>Temp °C</th><th>H.Amb %</th>
            <th>Suelo %</th><th>CO₂ ppm</th>
          </tr></thead>
          <tbody>
            ${sRows.slice(0, 20).map(r => `<tr>
              <td>${fmtP(r.periodo)}</td>
              <td style="color:var(--blue)">${n(r.avg_temperatura,1)}</td>
              <td style="color:var(--blue)">${n(r.avg_hum_ambiente,1)}</td>
              <td style="color:var(--green)">${n(r.avg_hum_suelo,1)}</td>
              <td style="color:var(--violet)">${n(r.avg_co2_ppm,1)}</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>`;

  // Inferencias agrupadas por período
  const periodMap = new Map();
  iRows.forEach(r => {
    const key = r.periodo || '—';
    if (!periodMap.has(key)) periodMap.set(key, { total: 0, classes: {} });
    const p = periodMap.get(key);
    p.total += Number(r.total);
    p.classes[r.clase || '?'] = (p.classes[r.clase || '?'] || 0) + Number(r.total);
  });

  const iHtml = periodMap.size === 0
    ? `<div class="no-data" style="height:40px;font-size:11px">Sin capturas</div>`
    : Array.from(periodMap.entries()).slice(0, 10).map(([period, data]) => {
        const bars = Object.entries(data.classes).map(([cls, count]) => {
          const pct = Math.round(count / data.total * 100);
          const color = CLS_COLORS[cls] || '#6b7280';
          return `<div class="inf-cls-row">
            <span class="inf-cls-name">${cls}</span>
            <div class="inf-bar-bg"><div class="inf-bar-fill" style="width:${pct}%;background:${color}"></div></div>
            <span class="inf-cls-count" style="color:${color}">${count}</span>
          </div>`;
        }).join('');
        return `<div class="inf-period-block">
          <div class="inf-period-lbl">${fmtP(period)} · ${data.total} cap.</div>
          ${bars}
        </div>`;
      }).join('');

  el.innerHTML = `
    <div class="hist-section-title">${ic('sensors', 12)} Sensores</div>
    ${sHtml}
    <div class="hist-section-title">${ic('science', 12)} Inferencias</div>
    ${iHtml}
  `;
}

/* ─── Carga y renderiza el histórico ─────────────────────────── */
async function loadS4Hist() {
  const el = document.getElementById('s4-hist-inner');
  if (el) el.innerHTML = `<div class="no-data"><div class="spinner"></div></div>`;
  const [sensors, inference] = await Promise.all([
    fetchJSON(`/api/sensors/history?period=${s4Period}`),
    fetchJSON(`/api/inference/history?period=${s4Period}`),
  ]);
  renderS4Hist(sensors, inference);
}

/* ─── Alterna entre vistas avg ↔ hist ───────────────────────── */
function applyS4View() {
  const avgView  = document.getElementById('s4-avg-view');
  const histView = document.getElementById('s4-hist-view');
  const title    = document.getElementById('s4-title');
  const toggle   = document.getElementById('s4-toggle');
  const tag      = document.getElementById('s4-tag');

  if (s4View === 'avg') {
    avgView.style.display  = '';
    histView.style.display = 'none';
    title.innerHTML    = ic('analytics') + ' Promedios Globales';
    toggle.textContent = '≡ Hist.';
    tag.style.display  = '';
    renderS4Avg(s4AvgData);
  } else {
    avgView.style.display  = 'none';
    histView.style.display = '';
    title.innerHTML    = ic('showchart') + ' Histórico';
    toggle.textContent = '← Volver';
    tag.style.display  = 'none';
  }
}

/* ─── Inicializa estructura de S4 (una sola vez) ─────────────── */
function initS4() {
  const body = document.getElementById('s4-body');
  body.innerHTML = `
    <div class="s4-views">
      <div class="s4-avg-view" id="s4-avg-view">
        <div id="s4-avg-inner"><div class="no-data"><div class="spinner"></div></div></div>
      </div>
      <div class="s4-hist-view" id="s4-hist-view" style="display:none">
        <div class="period-tabs" id="s4-tabs">
          <button class="period-tab active" data-period="day">Día</button>
          <button class="period-tab" data-period="week">Semana</button>
          <button class="period-tab" data-period="month">Mes</button>
        </div>
        <div class="hist-scroll" id="s4-hist-inner">
          <div class="no-data"><div class="spinner"></div></div>
        </div>
      </div>
    </div>
  `;

  // Tabs de período
  document.querySelectorAll('#s4-tabs .period-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#s4-tabs .period-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      s4Period = btn.dataset.period;
      loadS4Hist();
    });
  });

  // Botón toggle
  document.getElementById('s4-toggle').addEventListener('click', async () => {
    s4View = s4View === 'avg' ? 'hist' : 'avg';
    applyS4View();
    if (s4View === 'hist') await loadS4Hist();
  });

  s4Inited = true;
}

// Wrapper público (compatibilidad con refresh)
function renderS4(payload) {
  if (!s4Inited) initS4();
  s4AvgData = payload;
  if (s4View === 'avg') renderS4Avg(payload);
}

/* ═══════════════════════════════════════════════════════════════
   MAIN LOOP
═══════════════════════════════════════════════════════════════ */
async function refresh() {
  const { latest, today, sensors, averages } = await fetchAll();
  renderS1(latest);
  renderS2(today);
  renderS3(sensors);
  renderS4(averages);
  document.getElementById('last-update').textContent =
    'Act. ' + fmtTime(new Date().toISOString());
}

startClock();
refresh();
setInterval(refresh, 30000);
</script>
